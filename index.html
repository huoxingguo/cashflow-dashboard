<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cashflow Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1d4ed8, #0891b2);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 40px;
      max-width: 700px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    h1 {
      font-size: 42px;
      margin: 0 0 12px;
    }
    p {
      font-size: 20px;
      opacity: 0.9;
      margin: 0;
      line-height: 1.8;
    }
    .ok {
      margin-top: 24px;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(34,197,94,0.18);
      border: 1px solid rgba(34,197,94,0.4);
      color: #bbf7d0;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>现金流老板驾驶舱</h1>
    <p>如果你能看到这个页面，说明你的 GitHub Pages 发布已经成功了。</p>
    <div class="ok">✅ 发布成功</div>
  </div>
</body>
</html>
